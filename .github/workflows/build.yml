name: Build Visual Studio Solution

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild vulkan-c-learning.sln /p:Configuration=Debug /p:Platform=x64
        